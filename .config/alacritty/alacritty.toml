[shell]
args = ["new-session", "-A", "-D", "-s", "main"]
program = "/usr/local/bin/tmux"

[window]
blur = true
dynamic_padding = true
opacity = 0.75
decorations = "Buttonless"
option_as_alt = "Both"
padding = { x = 4, y = 0 }
